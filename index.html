<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ガンバレジェンズカード図鑑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== トップバー ===== -->
<div class="topBar">
    <div class="topBar-left">
        <div class="logo">
            <span class="logo-main">GANBARE</span>
            <span class="logo-sub">LEGENDS</span>
        </div>
    </div>
    <div class="topBar-center">
        <div class="searchWrap">
            <svg class="searchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input id="searchBox" placeholder="カード名・スキルで検索...">
        </div>
    </div>
    <div class="topBar-right">
        <button id="openProfile" class="btn-icon" title="マイページ">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
        </button>
        <button id="openFilter" class="btn-filter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
            </svg>
            絞り込み
        </button>
    </div>
</div>

<!-- ===== コントロールバー ===== -->
<div class="controlBar">
    <div id="resultCount" class="resultCount"></div>
    <div class="sortWrap">
        <span class="sortLabel">並び替え：</span>
        <select id="sortKey" class="sortSelect">
            <option value="">デフォルト</option>
            <option value="atk">ATK</option>
            <option value="def">DEF</option>
            <option value="hp">HP</option>
            <option value="spd">SPD</option>
            <option value="hissatsu">必殺</option>
        </select>
        <button id="sortOrder" class="sortOrderBtn" data-order="desc">
            <span class="sortArrow">↓</span>
            <span class="sortOrderLabel">降順</span>
        </button>
    </div>
</div>

<!-- ===== カード一覧 ===== -->
<div id="cardList"></div>

<!-- ===== カード拡大モーダル ===== -->
<div id="modal">
    <div class="modalInner">
        <img id="modalImg" alt="">
        <p class="modalHint">タップで裏面表示</p>
    </div>
</div>

<!-- ===== 絞り込みモーダル ===== -->
<div id="filterModal">
    <div class="filterContent">
        <div class="filterHeader">
            <h2>絞り込み</h2>
            <button id="closeFilter" class="closeX">✕</button>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">⚔</span> 属性</h3>
            <div id="attributeFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">★</span> レアリティ</h3>
            <div id="rarityFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">🗡</span> 武器</h3>
            <div id="weaponFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">💨</span> スピード（SPD）</h3>
            <div id="spdFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">⚡</span> アビリティ</h3>
            <div id="abilityFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">🃏</span> カード種別</h3>
            <div id="cardTypeFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">📺</span> 登場作品</h3>
            <div id="seriesFilters" class="seriesGrid"></div>
        </div>
        <div class="filterActions">
            <button id="resetFilter" class="btn-reset">リセット</button>
            <button id="applyFilter" class="btn-apply">適用する</button>
        </div>
    </div>
</div>

<!-- ===== プロフィールページ ===== -->
<div id="profilePage" class="profilePage">
    <div class="profileHeader">
        <button id="closeProfile" class="btn-back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            戻る
        </button>
        <h2 class="profileTitle">マイページ</h2>
    </div>
    <div class="profileBody">
        <div class="profileStats">
            <div class="profileStat">
                <span class="profileStatNum" id="ownedCount">0</span>
                <span class="profileStatLabel">所持カード</span>
            </div>
            <div class="profileStat">
                <span class="profileStatNum" id="favCount">0</span>
                <span class="profileStatLabel">お気に入り</span>
            </div>

        </div>
        <div class="profileTabs">
            <button class="profileTab active" data-tab="owned">所持カード</button>
            <button class="profileTab" data-tab="favorites">お気に入り</button>
        </div>
        <div id="profileCardList" class="profileCardList"></div>

        <!-- タブごとの「カードを選択」ボタン -->
        <div class="profileSelectBtnWrap">
            <button id="goSelectOwned"  class="btn-goSelect" data-mode="owned">＋ 所持カードを選択する</button>
            <button id="goSelectFav"    class="btn-goSelect btn-goSelect-fav" data-mode="favorites" style="display:none">＋ お気に入りを選択する</button>
        </div>
    </div>
</div>

<!-- ===== 選択モードバー（メイン一覧上部に表示） ===== -->
<div id="selectBar" class="selectBar" style="display:none">
    <button id="cancelSelect" class="btn-cancelSelect">キャンセル</button>
    <span class="selectBarTitle" id="selectBarTitle">所持カードを選択</span>
    <span class="selectBarCount" id="selectCount">0枚</span>
</div>

<!-- ===== 選択モード完了フッター ===== -->
<div id="selectFooter" class="selectFooter" style="display:none">
    <button id="selectDone" class="btn-selectDone">完了</button>
</div>

<script src="script.js"></script>
</body>
</html>
