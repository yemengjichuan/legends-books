<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ガンバレジェンズカード図鑑</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== トップバー ===== -->
<div class="topBar" id="topBar">
    <div class="topBar-left">
        <div class="logo">
            <span class="logo-main">GANBARE</span>
            <span class="logo-sub">LEGENDS</span>
        </div>
    </div>
    <div class="topBar-center" id="topBarCenter">
        <div class="searchWrap">
            <svg class="searchIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input id="searchBox" placeholder="カード名・スキルで検索...">
        </div>
    </div>
    <div class="topBar-right" id="topBarRight">
        <button id="openFilter" class="btn-filter">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
            </svg>
            絞り込み
        </button>
    </div>
</div>

<!-- ===== コントロールバー（カード一覧のみ） ===== -->
<div class="controlBar" id="controlBar">
    <div id="resultCount" class="resultCount"></div>
    <div class="sortWrap">
        <span class="sortLabel">並び替え：</span>
        <select id="sortKey" class="sortSelect">
            <option value="">デフォルト</option>
            <option value="atk">ATK（コウゲキ）</option>
            <option value="def">DEF（ボウギョ）</option>
            <option value="hp">HP（タイリョク）</option>
            <option value="spd">SPD（スピード）</option>
            <option value="hissatsu">ヒッサツ</option>
        </select>
        <button id="sortOrder" class="sortOrderBtn" data-order="desc">
            <span class="sortArrow">↓</span>
            <span class="sortOrderLabel">降順</span>
        </button>
    </div>
</div>

<!-- ===== 選択モードバー ===== -->
<div id="selectBar" class="selectBar" style="display:none">
    <button id="cancelSelect" class="btn-cancelSelect">キャンセル</button>
    <span class="selectBarTitle" id="selectBarTitle">所持カードを選択</span>
    <span class="selectBarCount" id="selectCount">0枚</span>
</div>

<!-- ===== メインコンテンツ ===== -->
<div id="pageCardList" class="page active">
    <div id="cardList"></div>
</div>

<div id="pageOwned" class="page">
    <div class="profileBody">
        <div class="profileStats">
            <div class="profileStat">
                <span class="profileStatNum" id="ownedCount">0</span>
                <span class="profileStatLabel">所持カード</span>
            </div>
            <div class="profileStat">
                <span class="profileStatNum" id="favCount">0</span>
                <span class="profileStatLabel">お気に入り</span>
            </div>
        </div>
        <div class="sectionLabel">所持カード一覧</div>
        <div id="ownedCardList" class="subCardList"></div>
        <div class="profileSelectBtnWrap">
            <button id="goSelectOwned" class="btn-goSelect">＋ 所持カードを選択・編集する</button>
        </div>
    </div>
</div>

<div id="pageTier" class="page">
    <!-- ティア表ヘッダー -->
    <div class="tierTopBar">
        <span class="tierTopTitle">ティア表</span>
        <button id="openTierSettings" class="btn-tierSettings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            段階を編集
        </button>
    </div>

    <!-- ティア行 -->
    <div id="tierRows"></div>

    <!-- 未配置カードトレイ -->
    <div class="tierTray" id="tierTray">
        <div class="tierTrayLabel">未配置カード（ここからドラッグ）</div>
        <div class="tierTrayCards" id="tierTrayCards"></div>
    </div>
</div>

<div id="pageFav" class="page">
    <div class="profileBody">
        <div class="sectionLabel">お気に入りカード一覧</div>
        <div id="favCardList2" class="subCardList"></div>
        <div class="profileSelectBtnWrap">
            <button id="goSelectFav2" class="btn-goSelect btn-goSelect-fav">＋ お気に入りを選択・編集する</button>
        </div>
    </div>
</div>

<!-- ===== 下部タブナビ ===== -->
<nav class="bottomNav">
    <button class="navTab active" data-page="pageCardList">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>カード一覧</span>
    </button>
    <button class="navTab" data-page="pageOwned">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><polyline points="16 3 12 7 8 3"/></svg>
        <span>所持カード</span>
    </button>
    <button class="navTab" data-page="pageTier">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>ティア表</span>
    </button>
    <button class="navTab" data-page="pageFav">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span>お気に入り</span>
    </button>
</nav>

<!-- ===== カード拡大モーダル ===== -->
<div id="modal">
    <div class="modalInner">
        <img id="modalImg" alt="">
        <p class="modalHint">タップで裏面表示</p>
    </div>
</div>

<!-- ===== 絞り込みモーダル ===== -->
<div id="filterModal">
    <div class="filterContent">
        <div class="filterHeader">
            <h2>絞り込み</h2>
            <button id="closeFilter" class="closeX">✕</button>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">⚔</span> 属性</h3>
            <div id="attributeFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">★</span> レアリティ</h3>
            <div id="rarityFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">🗡</span> 武器</h3>
            <div id="weaponFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">💨</span> スピード（SPD）</h3>
            <div id="spdFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">⚡</span> アビリティ</h3>
            <div id="abilityFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">🃏</span> カード種別</h3>
            <div id="cardTypeFilters" class="filterGroup"></div>
        </div>
        <div class="filterSection">
            <h3><span class="filterIcon">📺</span> 登場作品</h3>
            <div id="seriesFilters" class="seriesGrid"></div>
        </div>
        <div class="filterActions">
            <button id="resetFilter" class="btn-reset">リセット</button>
            <button id="applyFilter" class="btn-apply">適用する</button>
        </div>
    </div>
</div>

<!-- ===== ティア段階設定モーダル ===== -->
<div id="tierSettingsModal" class="tierSettingsModal">
    <div class="tierSettingsContent">
        <div class="filterHeader">
            <h2>段階を編集</h2>
            <button id="closeTierSettings" class="closeX">✕</button>
        </div>
        <div id="tierSettingsList"></div>
        <button id="addTierRow" class="btn-addTier">＋ 段階を追加</button>
        <div class="filterActions">
            <button id="saveTierSettings" class="btn-apply">保存する</button>
        </div>
    </div>
</div>

<!-- ===== 選択完了フッター ===== -->
<div id="selectFooter" class="selectFooter" style="display:none">
    <button id="selectDone" class="btn-selectDone">完了</button>
</div>

<script src="script.js"></script>
</body>
</html>
